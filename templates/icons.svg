    <circle cx="8" cy="16" r="1"/>
    <circle cx="16" cy="16" r="1"/>
    <path d="M7 6V4a2 2 0 012-2h6a2 2 0 012 2v2"/>
  </symbol>

  <!-- Phone Icon -->
  <symbol id="icon-phone" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
