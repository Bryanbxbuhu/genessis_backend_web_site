  <!-- Taxi Icon -->
  <symbol id="icon-taxi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <path d="M5 17h14v3H5zM3 11l2-5h14l2 5H3z"/>
    <rect x="7" y="6" width="10" height="5"/>
    <circle cx="7.5" cy="15.5" r="1.5"/>
    <circle cx="16.5" cy="15.5" r="1.5"/>
  </symbol>

  <!-- Car Icon (Rideshare) -->
  <symbol id="icon-car" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <path d="M5 17h14v3H5zM3 11l2-6h14l2 6H3z"/>
    <circle cx="7" cy="17" r="2"/>
    <circle cx="17" cy="17" r="2"/>
  </symbol>

  <!-- Cloud/Weather Icon -->
  <symbol id="icon-cloud" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <path d="M18 10h-1.26A8 8 0 109 20h9a5 5 0 000-10z"/>
